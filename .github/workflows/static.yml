name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Check Swift version
        run: swift --version

      - name: Build site
        run: swift run Japan-Region-Swift

      - name: Verify Build output
        run: |
          echo "=== Build directory ==="
          ls -R Build/
          echo "=== Build/images check ==="
          ls -R Build/images/ || echo "No images directory found"

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: 'Build/'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
